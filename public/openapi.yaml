openapi: 3.1.0
info:
  title: mikahassinen.dev API
  version: 1.0.0
  description: |
    The unofficial, overly documented API of mikahassinen.dev.
    All endpoints are intentionally useless and entirely delightful.

servers:
  - url: /api
    description: Current server

paths:
  /teapot:
    get:
      summary: I'm a teapot
      operationId: getTeapot
      description: |
        Returns HTTP 418 per RFC 2324. This server is, and always will be, a teapot.
        Attempting to brew coffee will result in a Janeway quote.
      tags:
        - Essential Services
      responses:
        "418":
          description: I'm a teapot
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 418
                  message:
                    type: string
                    example: I'm a teapot
                  quote:
                    type: string
                    example: "There's coffee in that nebula."
                  source:
                    type: string
                    example: "Captain Kathryn Janeway, USS Voyager"
                  rfc:
                    type: string
                    format: uri
                    example: "https://www.rfc-editor.org/rfc/rfc2324"

tags:
  - name: Essential Services
    description: Core functionality powering the known universe
